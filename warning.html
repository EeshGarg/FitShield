<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Take a Breath</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: rgba(21, 27, 35, 0.92);
      --border: rgba(126, 240, 168, 0.18);
      --text: #f3f8fb;
      --muted: #a8b4c3;
      --accent: #7ef0a8;
      --accent-dim: #243228;
      --panel-radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(126, 240, 168, 0.14), transparent 32%),
        linear-gradient(180deg, #111823 0%, #0d1117 100%);
      color: var(--text);
      font-family: "Segoe UI", sans-serif;
    }

    .shell {
      width: min(100%, 420px);
      padding: 28px;
      border-radius: var(--panel-radius);
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      text-align: center;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(126, 240, 168, 0.12);
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .ring {
      width: 148px;
      height: 148px;
      margin: 28px auto 18px;
      border-radius: 50%;
      border: 3px solid rgba(126, 240, 168, 0.45);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(126, 240, 168, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .time {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 26px;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .secondary {
      background: #293241;
      color: var(--text);
    }

    .primary {
      background: var(--accent);
      color: #102016;
      opacity: 0.45;
      box-shadow: none;
    }

    .primary.ready {
      opacity: 1;
      box-shadow: 0 10px 30px rgba(126, 240, 168, 0.25);
    }

    .primary:disabled {
      cursor: not-allowed;
      transform: none;
    }
  </style>
</head>
<body>
  <main class="shell">
    <!-- Pause screen shown before the blocked ordering site can be reopened. -->
    <span class="eyebrow">FitShield Check</span>
    <h1>Take one minute.</h1>
    <p>Check in before you order. Hunger, convenience, stress, and habit can feel similar in the moment.</p>

    <!-- warning.js updates this timer and animates the ring as time passes. -->
    <div class="ring" id="ring">
      <div class="time" id="timer">60</div>
    </div>

    <p class="hint" id="hint">When the timer ends, you can continue to the site for 5 minutes.</p>

    <!-- Continue stays locked until the countdown finishes and bypass is granted. -->
    <div class="actions">
      <button id="back" class="secondary" type="button">Go back</button>
      <button id="continue" class="primary" type="button" disabled>Locked</button>
    </div>
  </main>

  <script src="warning.js"></script>
</body>
</html>

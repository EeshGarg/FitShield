<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="warningPageTitle">Take a Breath</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --panel: rgba(21, 27, 35, 0.92);
      --border: rgba(126, 240, 168, 0.18);
      --text: #f3f8fb;
      --muted: #a8b4c3;
      --accent: #7ef0a8;
      --accent-dim: #243228;
      --panel-radius: 24px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(130% 70% at 50% -5%, rgba(255, 255, 255, 0.025), transparent 60%),
        linear-gradient(180deg, #111823 0%, #0d1117 100%);
      color: var(--text);
      font-family: "Segoe UI", -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    }

    /* Three side-by-side columns: block card | vegetarian | meat. Columns size
       to their own content (no stretching) so recipe cards stay compact, and
       collapse to fewer columns (finally one) on narrow screens. */
    .board {
      width: min(100%, 1120px);
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
      gap: 20px;
      align-items: start;
    }

    .shell {
      padding: 28px;
      border-radius: var(--panel-radius);
      background: var(--panel);
      border: 1px solid var(--border);
      box-shadow:
        0 1px 1px rgba(0, 0, 0, 0.16),
        0 14px 40px rgba(0, 0, 0, 0.28);
    }

    .block-card {
      text-align: center;
    }

    .recipe-col {
      display: flex;
      flex-direction: column;
      text-align: left;
    }

    .recipe-col[hidden] {
      display: none;
    }

    .eyebrow {
      display: inline-block;
      margin-bottom: 14px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(126, 240, 168, 0.12);
      color: var(--accent);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(1.8rem, 4vw, 2.4rem);
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .ring {
      width: 148px;
      height: 148px;
      margin: 28px auto 18px;
      border-radius: 50%;
      border: 3px solid rgba(126, 240, 168, 0.45);
      display: grid;
      place-items: center;
      box-shadow: 0 0 24px rgba(126, 240, 168, 0.18);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .time {
      font-size: 3rem;
      font-weight: 700;
      line-height: 1;
    }

    .hint {
      margin-top: 10px;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 26px;
    }

    button {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .secondary {
      background: #293241;
      color: var(--text);
    }

    .primary {
      background: var(--accent);
      color: #102016;
      opacity: 0.45;
      box-shadow: none;
    }

    .primary.ready {
      opacity: 1;
      box-shadow: 0 10px 30px rgba(126, 240, 168, 0.25);
    }

    .primary:disabled {
      cursor: not-allowed;
      transform: none;
    }

    /* Recipe column content. Each recipe fills its own .shell column. */
    .recipe-badge {
      align-self: flex-start;
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      padding: 4px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .recipe-badge.vegetarian {
      background: rgba(126, 240, 168, 0.14);
      color: var(--accent);
    }

    .recipe-badge.meat {
      background: rgba(255, 196, 120, 0.16);
      color: #ffc478;
    }

    .recipe-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin: 0 0 6px;
      color: var(--text);
    }

    .recipe-meta {
      font-size: 0.82rem;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .recipe-desc {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.5;
      margin: 0 0 14px;
    }

    .recipe-ingredients {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .recipe-ingredients b {
      color: var(--text);
      font-weight: 600;
    }

    /* Steps are always visible (no collapse), and scroll within the card if a
       recipe is long. The scrollbar is thin and themed so it stays subtle but
       discoverable. */
    .recipe-steps {
      margin-top: 16px;
    }

    .recipe-steps-title {
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .recipe-steps-list {
      margin: 0;
      padding-left: 20px;
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
      max-height: 188px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: rgba(126, 240, 168, 0.32) transparent;
    }

    .recipe-steps-list::-webkit-scrollbar {
      width: 6px;
    }

    .recipe-steps-list::-webkit-scrollbar-thumb {
      background: rgba(126, 240, 168, 0.28);
      border-radius: 999px;
    }

    .recipe-steps-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .recipe-steps-list li {
      margin-bottom: 6px;
    }

    /* Compact "I'll make this instead" button near the bottom of the card — a
       clearly-defined button, not a card-sized click zone. */
    .recipe-choose {
      margin-top: 18px;
      align-self: stretch;
      border: 1px solid rgba(126, 240, 168, 0.35);
      border-radius: 12px;
      padding: 11px 14px;
      background: rgba(126, 240, 168, 0.14);
      color: var(--accent);
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, opacity 0.15s ease;
    }

    .recipe-choose:hover:not(:disabled) {
      transform: translateY(-1px);
      background: rgba(126, 240, 168, 0.22);
    }

    .recipe-choose:disabled {
      cursor: default;
    }

    /* The chosen recipe's button fills with accent (success); the other card's
       button just dims. The card body stays fully visible either way. */
    .recipe-choose.chosen {
      background: var(--accent);
      border-color: var(--accent);
      color: #102016;
    }

    .recipe-choose:disabled:not(.chosen) {
      opacity: 0.45;
    }

    .recipe-choice-note {
      margin-top: 18px;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(126, 240, 168, 0.12);
      color: var(--accent);
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .recipe-choice-note[hidden] {
      display: none;
    }

    /* "Why you're seeing this" panel — populated by warning.js from the JSON
       blocklist metadata the background service worker resolves. */
    .block-reason {
      margin: 18px auto 0;
      max-width: 340px;
      text-align: left;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.03);
    }

    .block-reason[hidden] {
      display: none;
    }

    .block-reason-heading {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .block-reason-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.85rem;
      padding: 4px 0;
    }

    .block-reason-row + .block-reason-row {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .block-reason-label {
      color: var(--muted);
      flex: 0 0 auto;
    }

    .block-reason-value {
      color: var(--text);
      font-weight: 600;
      text-align: right;
      word-break: break-word;
    }

    button:focus-visible,
    a:focus-visible,
    summary:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <main class="board">
    <!-- Left column: the pause / block card. -->
    <section class="shell block-card">
      <!-- Pause screen shown before the blocked ordering site can be reopened. -->
      <span class="eyebrow" data-i18n="warningEyebrow">FitShield Check</span>
      <h1 data-i18n="warningTitle">Take one minute.</h1>
      <p data-i18n="warningIntro">Check in before you order. Hunger, convenience, stress, and habit can feel similar in the moment.</p>

      <!-- warning.js fills this with the brand the block interrupted, sourced from
           the JSON blocklist metadata via the background service worker. -->
      <p class="hint" id="brand" hidden></p>

      <!-- "Why you're seeing this" — the domain, rule type, category, and country
           metadata that triggered the block. Populated by warning.js. -->
      <div class="block-reason" id="blockReason" hidden></div>

      <!-- warning.js updates this timer and animates the ring as time passes. -->
      <div class="ring" id="ring">
        <div class="time" id="timer">60</div>
      </div>

      <!-- Hint text is managed by warning.js (it depends on lock state + pass
           duration), so it is re-rendered on language change rather than via
           data-i18n. -->
      <p class="hint" id="hint">When the timer ends, you can continue to the site.</p>

      <!-- Continue stays locked until the countdown finishes and bypass is granted.
           Its label is JS-managed (Locked / Continue / Opening). -->
      <div class="actions">
        <button id="back" class="secondary" type="button" data-i18n="warningBackButton">Go back</button>
        <button id="continue" class="primary" type="button" disabled>Locked</button>
      </div>

      <!-- Confirmation shown after the user picks a recipe instead of ordering.
           warning.js manages its text and visibility. -->
      <p class="recipe-choice-note" id="recipeChoiceNote" hidden></p>
    </section>

    <!-- Middle + right columns: lightweight at-home alternatives, chosen by
         warning.js from the local recipe catalog based on the blocked site's
         category/metadata. Each column is hidden until its recipe is ready. -->
    <section class="shell recipe-col" id="recipeVeg" hidden></section>
    <section class="shell recipe-col" id="recipeMeat" hidden></section>
  </main>

  <script src="i18n.js"></script>
  <script src="recipes.js"></script>
  <script src="warning.js"></script>
</body>
</html>
